<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGenius Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit','Inter',sans-serif; background: #06080d; color: #f1f5f9; }
        body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

        .header {
            background: rgba(255,255,255,0.035); backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
            padding: 1.25rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between;
            position:relative;z-index:1;
        }
        .header h1 { font-size: 1.3rem; font-weight: 800; }
        .header h1 span { background:linear-gradient(135deg,#8b5cf6,#6366f1,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
        .header a { color: #8b5cf6; text-decoration: none; font-size: 0.9rem; }

        .dashboard { max-width: 1100px; margin: 2rem auto; padding: 0 2rem; position:relative;z-index:1; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card {
            background: rgba(255,255,255,0.035); backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
            border-radius: 20px; padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-label { font-size: 0.82rem; color: #8b95a8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 800; background:linear-gradient(135deg,#8b5cf6,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }

        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; background:rgba(255,255,255,0.035);border-radius:50px;padding:6px;border:1px solid rgba(255,255,255,0.05); }
        .tab {
            padding: 0.6rem 1.5rem; border-radius: 50px; border: none;
            background: transparent; color: #8b95a8; cursor: pointer; font-family:'Outfit','Inter',sans-serif; font-size: 0.9rem; font-weight: 600;
            transition:all 0.2s;
        }
        .tab.active { background: linear-gradient(135deg,#8b5cf6,#6366f1,#3b82f6); color: #fff; box-shadow:0 4px 25px rgba(139,92,246,0.3); }
        .tab:hover:not(.active){color:#f1f5f9;background:rgba(255,255,255,0.05);}

        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); border-radius: 16px; overflow: hidden; }
        th { background: rgba(139,92,246,0.08); padding: 0.8rem 1rem; text-align: left; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1px; color: #8b95a8; }
        td { padding: 0.8rem 1rem; border-top: 1px solid rgba(255,255,255,0.04); font-size: 0.9rem; color:#f1f5f9; }
        tr:hover td { background: rgba(139,92,246,0.04); }
        .badge {
            display: inline-block; padding: 0.2rem 0.7rem; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700;
        }
        .badge-green { background: rgba(52,211,153,0.15); color: #34d399; }
        .badge-yellow { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .empty { text-align: center; padding: 3rem; color: #8b95a8; }
        .refresh-btn {
            background: linear-gradient(135deg,#8b5cf6,#6366f1,#3b82f6); color: #fff; border: none;
            padding: 0.5rem 1.2rem; border-radius: 50px; cursor: pointer; font-family:'Outfit','Inter',sans-serif; font-weight: 600; font-size: 0.85rem;
            box-shadow:0 4px 25px rgba(139,92,246,0.3);transition:all 0.2s;
        }
        .refresh-btn:hover{transform:translateY(-1px);box-shadow:0 8px 35px rgba(139,92,246,0.4);}
    </style>
</head>
<body>

<div class="header">
    <h1>Chat<span>Genius</span> Dashboard</h1>
    <div style="display:flex;gap:1rem;align-items:center;">
        <button class="refresh-btn" onclick="loadAll()">Refresh</button>
        <a href="/">&larr; Back to Site</a>
    </div>
</div>

<div class="dashboard">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Leads</div>
            <div class="stat-value" id="totalLeads">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Bookings</div>
            <div class="stat-value" id="totalBookings">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Today's Bookings</div>
            <div class="stat-value" id="todayBookings">0</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('leads', this)">Leads</button>
        <button class="tab" onclick="switchTab('bookings', this)">Bookings</button>
    </div>

    <div id="leadsTable">
        <table>
            <thead><tr><th>Name</th><th>Phone</th><th>Source</th><th>Date</th></tr></thead>
            <tbody id="leadsBody"><tr><td colspan="4" class="empty">No leads yet</td></tr></tbody>
        </table>
    </div>

    <div id="bookingsTable" style="display:none;">
        <table>
            <thead><tr><th>Customer</th><th>Type</th><th>Email</th><th>Phone</th><th>Date</th><th>Time</th><th>Status</th></tr></thead>
            <tbody id="bookingsBody"><tr><td colspan="7" class="empty">No bookings yet</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    function escapeHtml(str) {
        if (str == null) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('leadsTable').style.display = tab === 'leads' ? 'block' : 'none';
        document.getElementById('bookingsTable').style.display = tab === 'bookings' ? 'block' : 'none';
    }

    async function loadAll() {
        try {
            const [statsRes, leadsRes, bookingsRes] = await Promise.all([
                fetch('/api/stats'), fetch('/api/leads'), fetch('/api/bookings')
            ]);
            const stats = await statsRes.json();
            const leads = await leadsRes.json();
            const bookings = await bookingsRes.json();

            document.getElementById('totalLeads').textContent = stats.total_leads;
            document.getElementById('totalBookings').textContent = stats.total_bookings;
            document.getElementById('todayBookings').textContent = stats.today_bookings;

            const leadsBody = document.getElementById('leadsBody');
            if (leads.length === 0) {
                leadsBody.innerHTML = '<tr><td colspan="4" class="empty">No leads yet — they\'ll appear here when visitors leave their info in the chatbot.</td></tr>';
            } else {
                leadsBody.innerHTML = leads.map(l => `
                    <tr>
                        <td><strong>${escapeHtml(l.name)}</strong></td>
                        <td>${escapeHtml(l.phone)}</td>
                        <td><span class="badge badge-green">${escapeHtml(l.source)}</span></td>
                        <td>${new Date(l.created_at).toLocaleString()}</td>
                    </tr>
                `).join('');
            }

            const bookingsBody = document.getElementById('bookingsBody');
            if (bookings.length === 0) {
                bookingsBody.innerHTML = '<tr><td colspan="7" class="empty">No bookings yet — they\'ll appear here when visitors book through the chatbot.</td></tr>';
            } else {
                bookingsBody.innerHTML = bookings.map(b => {
                    const bType = b.service_id ? `<span class="badge badge-cyan">${escapeHtml(b.service || 'Service')}</span>` : '<span class="badge badge-blue">Appointment</span>';
                    const badgeClass = b.status === 'cancelled' ? 'badge-red' : b.status === 'no_show' ? 'badge-red' : b.status === 'confirmed' ? 'badge-green' : 'badge-yellow';
                    return `<tr${(b.status === 'cancelled' || b.status === 'no_show') ? ' style="opacity:0.5"' : ''}>
                        <td><strong>${escapeHtml(b.customer_name)}</strong></td>
                        <td>${bType}</td>
                        <td>${escapeHtml(b.customer_email) || '—'}</td>
                        <td>${escapeHtml(b.customer_phone) || '—'}</td>
                        <td>${escapeHtml(b.date)}</td>
                        <td>${escapeHtml(b.time)}</td>
                        <td><span class="badge ${badgeClass}">${escapeHtml(b.status)}</span></td>
                    </tr>`;
                }).join('');
            }
        } catch (e) {
            console.error('Failed to load dashboard data:', e);
        }
    }

    loadAll();
    setInterval(loadAll, 10000);
</script>

</body>
</html>

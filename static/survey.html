<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rate Your Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
html{font-size:90%}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit','Inter',sans-serif;background:#06080d;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;color:#f1f5f9;}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.card{background:rgba(255,255,255,0.035);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:20px;padding:48px;max-width:500px;width:100%;border:1px solid rgba(255,255,255,0.05);box-shadow:0 20px 60px rgba(0,0,0,0.4);text-align:center;position:relative;z-index:1;}
h1{font-size:24px;margin-bottom:8px;color:#f1f5f9;}
p{color:#8b95a8;margin-bottom:24px;line-height:1.5;}
.stars{display:flex;justify-content:center;gap:12px;margin:24px 0;}
.star{font-size:48px;cursor:pointer;transition:transform 0.2s;text-decoration:none;padding:8px;border-radius:12px;color:#f1f5f9;}
.star:hover{transform:scale(1.2);background:rgba(139,92,246,0.1);}
.feedback-section{display:none;margin-top:24px;}
textarea{width:100%;padding:12px;border:1px solid rgba(255,255,255,0.06);border-radius:12px;font-size:14px;font-family:'Outfit','Inter',sans-serif;resize:vertical;min-height:80px;background:rgba(255,255,255,0.04);color:#f1f5f9;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
textarea:focus{border-color:rgba(139,92,246,0.3);box-shadow:0 0 0 4px rgba(139,92,246,0.06);}
textarea::placeholder{color:rgba(139,149,168,0.5);}
.btn{display:inline-block;padding:12px 32px;border:none;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Outfit','Inter',sans-serif;background:linear-gradient(135deg,#8b5cf6,#6366f1,#3b82f6);color:#fff;margin-top:16px;box-shadow:0 4px 25px rgba(139,92,246,0.3);transition:all 0.2s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 35px rgba(139,92,246,0.4);}
.thank-you{display:none;}
</style>
</head>
<body>
<div class="card" id="surveyCard">
    <h1>How was your experience?</h1>
    <p>Your feedback helps us improve our service</p>
    <div class="stars" id="starsContainer"></div>
    <div class="feedback-section" id="feedbackSection">
        <textarea id="feedbackText" placeholder="Tell us more about your experience (optional)..."></textarea>
        <button class="btn" onclick="submitSurvey()">Submit Feedback</button>
    </div>
</div>
<div class="card thank-you" id="thankYou">
    <h1 style="color:#16a34a;">Thank You!</h1>
    <p>Your feedback has been recorded.</p>
    <p id="redirectMsg" style="display:none;">Redirecting you to Google Reviews...</p>
</div>
<script>
const token = new URLSearchParams(window.location.search).get('token') || window.location.pathname.split('/').pop();
let selectedRating = 0;
const starsEl = document.getElementById('starsContainer');
for (let i = 1; i <= 5; i++) {
    const s = document.createElement('a');
    s.className = 'star';
    s.href = '#';
    s.textContent = i <= selectedRating ? '\u2B50' : '\u2606';
    s.onclick = (e) => { e.preventDefault(); selectRating(i); };
    starsEl.appendChild(s);
}
function selectRating(r) {
    selectedRating = r;
    document.querySelectorAll('.star').forEach((s, idx) => { s.textContent = idx < r ? '\u2B50' : '\u2606'; });
    document.getElementById('feedbackSection').style.display = 'block';
}
async function submitSurvey() {
    const feedback = document.getElementById('feedbackText').value;
    try {
        const r = await fetch('/api/survey/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, rating: selectedRating, feedback })
        }).then(r => r.json());
        document.getElementById('surveyCard').style.display = 'none';
        document.getElementById('thankYou').style.display = 'block';
        if (r.redirect_to_google && r.google_review_url) {
            document.getElementById('redirectMsg').style.display = 'block';
            setTimeout(() => { window.location.href = r.google_review_url; }, 2000);
        }
    } catch (e) { alert('Error submitting survey'); }
}
</script>
</body>
</html>
